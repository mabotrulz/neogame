<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Joga com Neo — Letras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  .game {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: 800px;
    background: linear-gradient(135deg, #16213e, #0f3460);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    padding: 16px 16px 6px;
    flex-shrink: 0;
  }
  .header h1 {
    color: #e94560;
    font-size: clamp(14px, 3.5vw, 22px);
    font-weight: 700;
    letter-spacing: 2px;
  }
  .header .hint {
    color: #888;
    font-size: clamp(10px, 2vw, 13px);
    margin-top: 2px;
    min-height: 18px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 4px 16px 8px;
    flex-shrink: 0;
  }
  .stats .stat { text-align: center; }
  .stats .stat .val {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    color: #fff;
  }
  .stats .stat .label {
    font-size: clamp(8px, 1.8vw, 11px);
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Letter slots */
  .slots-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 8px 12px;
    gap: 6px;
    min-height: 0;
  }
  .phrase-label {
    color: #666;
    font-size: clamp(10px, 2vw, 12px);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .slots-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 4px;
  }
  .word-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .word-group + .word-group::before {
    content: '';
    display: inline-block;
    width: 12px;
  }

  .slot {
    width: clamp(32px, 8vw, 52px);
    height: clamp(38px, 9vw, 56px);
    border: 2.5px dashed #4ecca3;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 5vw, 30px);
    font-weight: 700;
    color: #4ecca3;
    transition: all 0.25s;
    background: rgba(78, 204, 163, 0.05);
    position: relative;
  }
  .slot.filled {
    border-style: solid;
    background: rgba(78, 204, 163, 0.18);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .slot.wrong {
    border-color: #e94560;
    background: rgba(233, 69, 96, 0.15);
    animation: shake 0.35s ease;
  }
  .slot.drag-over {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.1);
    transform: scale(1.08);
  }
  .slot.space {
    border: none;
    background: transparent;
    width: clamp(8px, 2vw, 16px);
    height: auto;
    pointer-events: none;
  }

  @keyframes popIn {
    0% { transform: scale(0.7); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Letter pool */
  .letter-pool {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 10px 12px;
    flex-shrink: 0;
    min-height: 56px;
    max-height: 180px;
    overflow-y: auto;
  }

  .letter {
    width: clamp(34px, 8.5vw, 54px);
    height: clamp(38px, 9vw, 56px);
    background: #4ecca3;
    color: #1a1a2e;
    font-size: clamp(18px, 5vw, 30px);
    font-weight: 700;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    touch-action: none;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
    box-shadow: 0 3px 12px rgba(78, 204, 163, 0.3);
  }
  .letter:active { cursor: grabbing; }
  .letter:hover { transform: translateY(-2px); }
  .letter.dragging {
    opacity: 0.35;
    transform: scale(0.9);
  }
  .letter.placed {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.4);
  }

  /* Feedback */
  .feedback {
    text-align: center;
    padding: 4px 16px;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .feedback .msg {
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .feedback .msg.ok { color: #4ecca3; }
  .feedback .msg.fail { color: #e94560; }

  /* Win overlay */
  .win-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 52, 96, 0.93);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    padding: 30px;
    text-align: center;
  }
  .win-overlay.active { opacity: 1; pointer-events: all; }
  .win-overlay .star {
    font-size: clamp(40px, 12vw, 70px);
    animation: popIn 0.5s ease;
  }
  .win-overlay h2 {
    font-size: clamp(28px, 8vw, 48px);
    color: #4ecca3;
    margin: 4px 0;
  }
  .win-overlay .phrase-read {
    font-size: clamp(22px, 6vw, 40px);
    color: #fff;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 4px 0 12px;
  }
  .win-overlay button {
    padding: 12px 36px;
    font-size: clamp(14px, 3vw, 18px);
    font-weight: 700;
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.2s;
    margin-top: 8px;
  }
  .win-overlay button:hover { transform: scale(1.05); }

  .confetti-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 99;
  }
  .confetti {
    position: absolute;
    width: 8px; height: 8px;
    top: -10px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Floating drag ghost */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    width: clamp(34px, 8.5vw, 54px);
    height: clamp(38px, 9vw, 56px);
    background: #4ecca3;
    color: #1a1a2e;
    font-size: clamp(18px, 5vw, 30px);
    font-weight: 700;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 25px rgba(78,204,163,0.5);
    transform: translate(-50%, -50%) scale(1.15);
    opacity: 0.9;
  }

  @media (max-width: 400px) {
    .slot { width: clamp(26px, 10vw, 36px); height: clamp(30px, 11vw, 40px); font-size: 16px; }
    .letter { width: clamp(28px, 10vw, 38px); height: clamp(30px, 11vw, 40px); font-size: 16px; }
    .letter-pool { gap: 4px; padding: 6px 8px; }
    .slots-row { gap: 4px; }
    .word-group { gap: 4px; }
  }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="header">
    <h1>🔤 Arrasta as Letras</h1>
    <div class="hint" id="phraseHint">Arrasta cada letra para o sítio certo</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="scoreDisplay">0</div><div class="label">Acertadas</div></div>
    <div class="stat"><div class="val" id="totalDisplay">0</div><div class="label">Frases</div></div>
    <div class="stat"><div class="val" id="streakDisplay" style="color:#e94560">0</div><div class="label">Seq.</div></div>
  </div>

  <div class="slots-area">
    <div class="phrase-label" id="phraseLabel">⋯</div>
    <div class="slots-row" id="slotsContainer"></div>
  </div>

  <div class="letter-pool" id="letterPool"></div>

  <div class="feedback"><div class="msg" id="feedbackMsg"></div></div>

  <div class="win-overlay" id="winOverlay">
    <div class="star">⭐</div>
    <h2>Muito bem!</h2>
    <div class="phrase-read" id="winPhrase"></div>
    <button onclick="nextPhrase()">Próxima Frase →</button>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>
</div>

<div class="drag-ghost" id="dragGhost" style="display:none"></div>

<script>
// ===== PHRASES =====
const PHRASES = [
  { text: 'Neo Almeida', hint: 'O nome do menino mais esperto' },
  { text: 'Ola mundo', hint: 'A primeira frase de todos' },
  { text: 'Bom dia', hint: 'Uma saudação' },
  { text: 'Eu gosto de jogar', hint: 'O que tu mais gostas?' },
  { text: 'A minha mae', hint: 'A pessoa que te ama' },
  { text: 'O meu pai', hint: 'O melhor amigo' },
  { text: 'Vamos brincar', hint: 'Um convite' },
  { text: 'A escola', hint: 'O sítio onde aprendes' },
  { text: 'A Andreia', hint: 'O nome da mamã' },
  { text: 'O Mario', hint: 'O nome do papá' },
];

let currentPhraseIdx = 0;
let score = 0;
let total = 0;
let streak = 0;
let placedCount = 0;
let totalLetters = 0;
let isWin = false;
let dragData = null;
let touchGhost = null;

// Speech
function speak(text, cb) {
  if (!window.speechSynthesis) { if(cb) cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'pt-PT';
  u.rate = 0.85;
  u.pitch = 1.1;
  u.onend = () => { if(cb) cb(); };
  u.onerror = () => { if(cb) cb(); };
  window.speechSynthesis.speak(u);
}

function speakLetter(l) {
  const names = {
    'a':'á','b':'bê','c':'cê','d':'dê','e':'é','f':'éfe','g':'guê','h':'agá',
    'i':'i','j':'jota','k':'cápa','l':'éle','m':'éme','n':'éne','o':'ó',
    'p':'pê','q':'quê','r':'érre','s':'ésse','t':'tê','u':'u','v':'vê',
    'w':'dáblio','x':'xis','y':'ípsilon','z':'zê'
  };
  const lower = l.toLowerCase();
  const sound = names[lower] || l;
  speak(sound);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadPhrase(idx) {
  const phrase = PHRASES[idx % PHRASES.length];
  const words = phrase.text.split(' ');
  
  // Build letter array with word boundaries
  // [{letter: 'N', wordIdx: 0, posInWord: 0}, {letter: 'e', wordIdx: 0, posInWord: 1}, ...]
  const letterData = [];
  words.forEach((word, wi) => {
    for (let li = 0; li < word.length; li++) {
      letterData.push({ letter: word[li], wordIdx: wi, posInWord: li, index: letterData.length });
    }
  });
  
  totalLetters = letterData.length;
  placedCount = 0;
  isWin = false;

  document.getElementById('winOverlay').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('phraseHint').textContent = phrase.hint || 'Arrasta cada letra';
  document.getElementById('phraseLabel').textContent = phrase.text.replace(/./g, '_ ');

  // Build slots (grouped by word)
  const slotsEl = document.getElementById('slotsContainer');
  slotsEl.innerHTML = '';

  // Create word groups
  let letterIdx = 0;
  words.forEach((word, wi) => {
    if (wi > 0) {
      // Spacer between words
      const spacer = document.createElement('div');
      spacer.className = 'slot space';
      spacer.dataset.index = -1;
      slotsEl.appendChild(spacer);
    }
    const group = document.createElement('div');
    group.className = 'word-group';
    
    for (let li = 0; li < word.length; li++) {
      const div = document.createElement('div');
      div.className = 'slot';
      div.dataset.index = letterIdx;
      div.dataset.letter = word[li];
      div.dataset.wordIdx = wi;
      div.dataset.posInWord = li;
      div.textContent = '';
      
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
      div.addEventListener('drop', e => { e.preventDefault(); div.classList.remove('drag-over'); handleDrop(e, letterIdx); });
      
      group.appendChild(div);
      letterIdx++;
    }
    slotsEl.appendChild(group);
  });

  // Build letter pool (shuffled)
  const pool = document.getElementById('letterPool');
  pool.innerHTML = '';
  const shuffled = shuffle(letterData.map(ld => ({ letter: ld.letter, index: ld.index })));
  
  shuffled.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'letter';
    div.draggable = true;
    div.textContent = item.letter;
    div.dataset.letter = item.letter;
    div.dataset.origIdx = item.index;
    div.dataset.poolIdx = i;
    
    // Mouse drag
    div.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', JSON.stringify({letter: item.letter, idx: item.index}));
      div.classList.add('dragging');
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    
    // Touch drag
    let tx, ty;
    div.addEventListener('touchstart', e => {
      const t = e.touches[0];
      tx = t.clientX; ty = t.clientY;
      div.classList.add('dragging');
      dragData = { letter: item.letter, idx: item.index, el: div };
      // Show ghost
      const ghost = document.getElementById('dragGhost');
      ghost.textContent = item.letter;
      ghost.style.display = 'flex';
      ghost.style.left = t.clientX + 'px';
      ghost.style.top = t.clientY + 'px';
    }, { passive: true });
    
    div.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const ghost = document.getElementById('dragGhost');
      ghost.style.left = t.clientX + 'px';
      ghost.style.top = t.clientY + 'px';
    }, { passive: false });
    
    div.addEventListener('touchend', e => {
      div.classList.remove('dragging');
      document.getElementById('dragGhost').style.display = 'none';
      const t = e.changedTouches[0];
      const dx = t.clientX - tx;
      const dy = t.clientY - ty;
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      
      // Find slot under finger
      const slots = document.querySelectorAll('.slot:not(.space)');
      let targetIdx = -1;
      slots.forEach(slot => {
        const r = slot.getBoundingClientRect();
        if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) {
          targetIdx = parseInt(slot.dataset.index);
        }
      });
      if (targetIdx >= 0 && dragData) {
        handleLetterDrop(dragData.letter, dragData.idx, targetIdx);
      }
      dragData = null;
    }, { passive: true });
    
    // Click fallback
    div.addEventListener('click', () => {
      // Find first empty slot
      const slots = document.querySelectorAll('.slot:not(.space)');
      for (const slot of slots) {
        const idx = parseInt(slot.dataset.index);
        if (idx >= 0 && !slot.classList.contains('filled')) {
          handleLetterDrop(item.letter, item.index, idx);
          break;
        }
      }
    });
    
    pool.appendChild(div);
  });

  updateStats();
}

function handleDrop(e, slotIdx) {
  try {
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    handleLetterDrop(data.letter, data.idx, slotIdx);
  } catch(_) {}
}

function handleLetterDrop(letter, origIdx, slotIdx) {
  if (isWin) return;
  
  // Get slot element
  const slots = document.querySelectorAll('.slot:not(.space)');
  const slotEl = Array.from(slots).find(s => parseInt(s.dataset.index) === slotIdx);
  if (!slotEl || slotEl.classList.contains('filled')) return;
  
  const expectedLetter = slotEl.dataset.letter;
  
  if (letter === expectedLetter) {
    // Correct!
    slotEl.classList.add('filled');
    slotEl.textContent = letter;
    placedCount++;
    
    // Hide the letter from pool
    const poolLetters = document.querySelectorAll('.letter');
    poolLetters.forEach(el => {
      if (el.textContent === letter && !el.classList.contains('placed')) {
        // Find the original unused letter with matching origIdx
        if (parseInt(el.dataset.origIdx) === origIdx) {
          el.classList.add('placed');
        }
      }
    });
    
    // Play letter sound
    speakLetter(letter);
    
    score++;
    streak++;
    showFeedback('✅', 'ok');
    updateStats();
    
    if (placedCount === totalLetters) {
      setTimeout(() => onWin(), 500);
    }
  } else {
    // Wrong
    slotEl.classList.add('wrong');
    setTimeout(() => slotEl.classList.remove('wrong'), 400);
    streak = 0;
    showFeedback('❌', 'fail');
    updateStats();
  }
}

function onWin() {
  isWin = true;
  const phrase = PHRASES[currentPhraseIdx % PHRASES.length];
  document.getElementById('winPhrase').textContent = phrase.text;
  document.getElementById('winOverlay').classList.add('active');
  spawnConfetti();
  setTimeout(() => speak(phrase.text), 400);
}

function spawnConfetti() {
  const c = document.getElementById('confettiContainer');
  const colors = ['#4ecca3','#e94560','#ffd700','#ff6b9d','#00d2ff','#a29bfe'];
  for (let i = 0; i < 50; i++) {
    const e = document.createElement('div');
    e.className = 'confetti';
    e.style.left = Math.random() * 100 + '%';
    e.style.background = colors[Math.floor(Math.random() * colors.length)];
    e.style.width = (Math.random() * 6 + 3) + 'px';
    e.style.height = (Math.random() * 6 + 3) + 'px';
    e.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    e.style.animationDuration = (Math.random() * 2 + 2) + 's';
    e.style.animationDelay = (Math.random() * 1.5) + 's';
    c.appendChild(e);
  }
}

function nextPhrase() {
  currentPhraseIdx++;
  loadPhrase(currentPhraseIdx);
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.className = 'msg ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 1200);
}

function updateStats() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('totalDisplay').textContent = PHRASES.length;
  document.getElementById('streakDisplay').textContent = streak;
}

loadPhrase(0);
</script>
</body>
</html>
