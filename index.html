<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Joga com Neo — Letras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden; touch-action: none; user-select: none;
  }

  .game {
    width: 100vw; height: 100vh; height: 100dvh;
    max-width: 800px;
    background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 40%, #b8e6b8 70%, #7ec850 100%);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  .header {
    text-align: center; padding: 10px 12px 4px;
    flex-shrink: 0; position: relative; z-index: 2;
  }
  .header h1 {
    color: #c0392b; font-size: clamp(16px, 4vw, 26px);
    font-weight: 900; letter-spacing: 2px;
  }
  .header .hint {
    color: #444; font-size: clamp(11px, 2.5vw, 16px);
    margin-top: 2px; min-height: 18px; font-weight: 600;
  }

  .stats {
    display: flex; justify-content: center; gap: 28px;
    padding: 2px 12px 4px; flex-shrink: 0; position: relative; z-index: 2;
  }
  .stats .stat { text-align: center; }
  .stats .stat .val { font-size: clamp(22px, 5vw, 32px); font-weight: 700; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
  .stats .stat .label { font-size: clamp(9px, 2vw, 13px); color: #ddd; text-transform: uppercase; letter-spacing: 1px; }

  .slots-area {
    flex: 2;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 16px 8px 8px;
    position: relative; z-index: 2;
    min-height: 0;
    overflow: visible;
  }

  .slots-row {
    display: flex; flex-wrap: wrap;
    justify-content: center; align-items: flex-end;
    gap: 8px; padding: 12px 6px;
    position: relative;
  }
  .word-group { display: flex; gap: 6px; align-items: flex-end; }
  .word-group + .word-group::before { content: ''; display: inline-block; width: 10px; }

  .slot-wrapper {
    position: relative;
    width: clamp(36px, 8.5vw, 56px);
    height: clamp(42px, 10vw, 64px);
  }

  .slot {
    width: 100%; height: 100%;
    border: 2.5px dashed #fff;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(18px, 4.5vw, 30px);
    font-weight: 700; color: #fff;
    transition: all 0.25s;
    background: rgba(255,255,255,0.12);
  }
  .slot.filled {
    border-style: solid;
    background: rgba(255,255,255,0.25);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .slot.wrong {
    border-color: #e74c3c;
    background: rgba(231,76,60,0.25);
    animation: shake 0.35s ease;
  }
  .slot.drag-over {
    border-color: #f1c40f;
    background: rgba(241,196,15,0.15);
    transform: scale(1.08);
  }
  .slot.space { border: none; background: transparent; width: 8px; pointer-events: none; }

  @keyframes popIn { 0%{transform:scale(0.7)}100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)} }

  /* Characters */
  .slot-character {
    position: absolute;
    z-index: 5;
    pointer-events: none;
    width: clamp(32px, 7.5vw, 50px);
    height: clamp(32px, 7.5vw, 50px);
    transform: translateX(-50%);
    transition: left 0.4s cubic-bezier(0.34, 1.4, 0.64, 1), top 0.4s ease;
  }
  .slot-character img {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: auto;
  }

  .slot-character.bird.hop {
    animation: birdHop 0.35s ease;
  }
  @keyframes birdHop {
    0%,100% { transform: translateX(-50%) translateY(0); }
    40% { transform: translateX(-50%) translateY(-12px) scaleX(0.85); }
  }

  .slot-character.pig.idle-jump {
    animation: pigIdleJump 0.5s ease;
  }
  @keyframes pigIdleJump {
    0%,100% { transform: translateX(-50%) translateY(0); }
    30% { transform: translateX(-50%) translateY(-10px) scaleX(0.9); }
    60% { transform: translateX(-50%) translateY(10px) scaleX(1.05); }
  }

  .slot-character.pig.scared {
    animation: pigShake 0.5s ease infinite;
  }
  @keyframes pigShake {
    0%,100% { transform: translateX(-50%) translateY(0); }
    25% { transform: translateX(-50%) translateY(-4px); }
    75% { transform: translateX(-50%) translateY(4px); }
  }

  .pig-fly {
    position: fixed; z-index: 200; pointer-events: none;
    left: 50%; top: 50%;
    animation: pigGrow 2s cubic-bezier(0.2,0.8,0.3,1) forwards;
  }
  .pig-fly img { width: 80px; height: 80px; object-fit: contain; }
  @keyframes pigGrow {
    0%   { transform: translate(-50%,-50%) scale(0.3) rotate(-10deg); opacity: 0; }
    20%  { opacity: 1; }
    60%  { transform: translate(-50%,-50%) scale(5) rotate(-3deg); opacity: 1; }
    80%  { transform: translate(-50%,-50%) scale(5.5) rotate(3deg); opacity: 1; }
    100% { transform: translate(-50%, calc(50vh + 60vw)) scale(5) rotate(15deg); opacity: 1; }
  }

  /* Explosion */
  .explosion {
    position: fixed; z-index: 190; pointer-events: none;
    left: 50%; top: 50%;
    animation: explBoom 0.6s ease forwards;
  }
  @keyframes explBoom {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    20% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(2); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
  }
  .explosion-ring {
    position: fixed; z-index: 189; pointer-events: none;
    left: 50%; top: 50%;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 6px solid #f39c12;
    animation: explRing 0.7s ease forwards;
  }
  @keyframes explRing {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(8); opacity: 0; }
  }
  .explosion-ring:nth-child(2) { border-color: #e74c3c; animation-delay: 0.1s; }
  .explosion-ring:nth-child(3) { border-color: #f1c40f; animation-delay: 0.2s; }
  .explosion-particle {
    position: fixed; z-index: 188; pointer-events: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    animation: explParticle 0.8s ease forwards;
  }
  @keyframes explParticle {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0); }
  }

  /* Flash */
  .flash {
    position: fixed; inset: 0; z-index: 180; pointer-events: none;
    background: #fff;
    animation: flashFade 0.3s ease forwards;
  }
  @keyframes flashFade {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  .letter-pool {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 5px;
    padding: 6px 10px;
    flex-shrink: 0; min-height: 42px; max-height: 100px;
    overflow-y: auto; position: relative; z-index: 2;
  }
  .letter {
    width: clamp(36px, 8.5vw, 54px);
    height: clamp(42px, 10vw, 58px);
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff; font-size: clamp(18px, 4.5vw, 30px);
    font-weight: 700; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; touch-action: none;
    transition: transform 0.15s, opacity 0.3s;
    box-shadow: 0 4px 12px rgba(231,76,60,0.3), inset 0 2px 0 rgba(255,255,255,0.2);
    border-bottom: 3px solid #a93226;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }
  .letter:active { cursor: grabbing; }
  .letter:hover { transform: translateY(-3px); }
  .letter.dragging { opacity: 0.35; transform: scale(0.9); }
  .letter.placed { opacity: 0; pointer-events: none; transform: scale(0.4); }

  .feedback {
    text-align: center; padding: 4px 12px;
    min-height: 30px; flex-shrink: 0; position: relative; z-index: 2;
  }
  .feedback .msg { font-size: clamp(16px, 3.5vw, 24px); font-weight: 700; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
  .feedback .msg.ok { color: #fff; }
  .feedback .msg.fail { color: #e74c3c; }

  .win-overlay {
    position: absolute; inset: 0;
    background: rgba(15,52,96,0.93);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.5s; padding: 30px; text-align: center;
  }
  .win-overlay.active { opacity: 1; pointer-events: all; }
  .win-overlay .star { font-size: clamp(30px,8vw,50px); animation: popIn 0.5s ease; display: block; }
  .win-overlay h2 { font-size: clamp(32px,9vw,52px); color: #4ecca3; margin: 2px 0; }
  .win-overlay .phrase-read { font-size: clamp(24px,6vw,42px); color: #fff; font-weight: 700; letter-spacing: 3px; margin: 4px 0 10px; }
  .win-overlay .win-chars {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin: 8px 0;
  }
  .win-overlay .win-chars img {
    width: clamp(50px, 12vw, 90px);
    height: clamp(50px, 12vw, 90px);
    object-fit: contain;
  }
  .win-overlay .win-chars .vs {
    font-size: clamp(24px, 5vw, 40px);
    color: #f1c40f;
    font-weight: 900;
    animation: popIn 0.4s ease;
  }
  .win-overlay .win-chars .bird-win {
    animation: birdWin 1s ease infinite;
  }
  @keyframes birdWin {
    0%,100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-6px) rotate(-5deg); }
    75% { transform: translateY(-6px) rotate(5deg); }
  }
  .win-overlay .win-chars .pig-defeated {
    filter: grayscale(0.8) brightness(0.6);
    transform: scaleX(-1) rotate(15deg);
    animation: pigDefeated 1.5s ease infinite;
  }
  @keyframes pigDefeated {
    0%,100% { transform: scaleX(-1) rotate(15deg) translateY(0); }
    50% { transform: scaleX(-1) rotate(20deg) translateY(4px); }
  }
  .win-overlay button {
    padding: 12px 40px; font-size: clamp(14px,3vw,20px); font-weight: 700;
    background: #4ecca3; color: #1a1a2e; border: none; border-radius: 14px;
    cursor: pointer; letter-spacing: 1px; transition: transform 0.2s; margin-top: 6px;
  }
  .win-overlay button:hover { transform: scale(1.05); }

  /* Character intro animation */
  .intro-overlay {
    position: absolute; inset: 0;
    background: rgba(10,10,20,0.92);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 160;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .intro-overlay.active { opacity: 1; pointer-events: all; }
  .intro-overlay .intro-char {
    width: clamp(140px, 35vw, 260px);
    height: clamp(140px, 35vw, 260px);
    object-fit: contain;
    animation: introEntrance 0.5s ease forwards;
  }
  @keyframes introEntrance {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .intro-overlay .intro-name {
    font-size: clamp(24px, 7vw, 48px);
    font-weight: 800;
    color: #4ecca3;
    margin-top: 8px;
    text-shadow: 0 0 30px rgba(78,204,163,0.3);
    animation: introNameIn 0.4s ease 0.3s forwards;
    opacity: 0;
  }
  @keyframes introNameIn {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .drag-ghost {
    position: fixed; pointer-events: none; z-index: 200;
    width: clamp(36px,8.5vw,54px); height: clamp(42px,10vw,58px);
    background: linear-gradient(135deg,#e74c3c,#c0392b); color: #fff;
    font-size: clamp(18px,4.5vw,30px); font-weight: 700; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); transform: translate(-50%,-50%) scale(1.15);
    border-bottom: 3px solid #a93226;
  }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="header">
    <h1>🐦 Letras ⚔️ 🐷</h1>
    <div class="hint" id="phraseHint">Arrasta cada letra!</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="scoreDisplay">0</div><div class="label">⭐</div></div>
    <div class="stat"><div class="val" id="totalDisplay">0</div><div class="label">Frases</div></div>
  </div>

  <div class="slots-area" id="slotsArea">
    <div class="slots-row" id="slotsContainer"></div>
  </div>

  <div class="letter-pool" id="letterPool"></div>

  <div class="feedback"><div class="msg" id="feedbackMsg"></div></div>

  <div class="win-overlay" id="winOverlay">
    <div class="star">⭐</div>
    <div class="win-chars">
      <img src="assets/red_bird.png" class="bird-win" id="winBird" alt="🐦">
      <div class="vs">⚔️</div>
      <img src="assets/green_pig.png" class="pig-defeated" id="winPig" alt="🐷">
    </div>
    <h2>Muito bem!</h2>
    <div class="phrase-read" id="winPhrase"></div>
    <button onclick="nextPhrase()">Próxima →</button>
  </div>
</div>

<!-- Intro overlay -->
<div class="intro-overlay" id="introOverlay">
  <img class="intro-char" id="introImage" src="" alt="">
  <div class="intro-name" id="introName"></div>
</div>

<!-- Start overlay -->
<div class="start-overlay" id="startOverlay" style="position:absolute;inset:0;background:rgba(15,52,96,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:150;padding:30px;text-align:center;transition:opacity 0.5s">
  <div style="font-size:clamp(40px,12vw,70px);margin-bottom:8px">🐦</div>
  <h2 style="color:#4ecca3;font-size:clamp(24px,7vw,40px);margin-bottom:4px">Joga com Neo</h2>
  <p style="color:#aaa;font-size:clamp(13px,3vw,17px);margin-bottom:24px">Arrasta as letras para formar palavras!</p>
  <button onclick="startLetterGame()" style="padding:16px 48px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#4ecca3,#00d2ff);color:#1a1a2e;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 25px rgba(78,204,163,0.3)">▶ COMEÇAR</button>
</div>

<div class="drag-ghost" id="dragGhost" style="display:none"></div>

<script>
const PHRASES = [
  { text: 'Neo Almeida', hint: 'O nome do menino mais esperto' },
  { text: 'Ola mundo', hint: 'A primeira frase' },
  { text: 'Bom dia', hint: 'Uma saudação' },
  { text: 'Eu gosto de jogar', hint: 'O que tu mais gostas?' },
  { text: 'A minha mae', hint: 'A pessoa que te ama' },
  { text: 'O meu pai', hint: 'O melhor amigo' },
  { text: 'Vamos brincar', hint: 'Um convite' },
  { text: 'A escola', hint: 'Onde aprendes' },
  { text: 'A Andreia', hint: 'A mamã' },
  { text: 'O Mario', hint: 'O papá' },
];

const BIRDS = ['red_bird.png','blue_bird.png','yellow_bird.png','black_bird.png'];
const PIGS = ['green_pig.png','king_pig.png','foreman_pig.png','corporal_pig.png'];

const BIRD_NAMES = {
  'red_bird.png':'Pássaro Vermelho',
  'blue_bird.png':'Os Azuis',
  'yellow_bird.png':'Pássaro Amarelo',
  'black_bird.png':'Pássaro Preto'
};
const PIG_NAMES = {
  'green_pig.png':'Porco Verde',
  'king_pig.png':'Rei Porco',
  'foreman_pig.png':'Capataz Porco',
  'corporal_pig.png':'Cabo Porco'
};

let currentPhraseIdx = 0, score = 0;
let placedCount = 0, totalLetters = 0, isWin = false;
let dragData = null, hintTimer = null, pigTimer = null;
let currentBird = 'red_bird.png', currentPig = 'green_pig.png';
let phraseOrder = [];
const HINT_DELAY = 6000;

// Shuffle phrase order
function shufflePhrases() {
  phraseOrder = [];
  for (let i = 0; i < PHRASES.length; i++) phraseOrder.push(i);
  for (let i = phraseOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [phraseOrder[i], phraseOrder[j]] = [phraseOrder[j], phraseOrder[i]];
  }
}
shufflePhrases();

// Intro animation
function showIntro(imgSrc, name, duration, callback) {
  const overlay = document.getElementById('introOverlay');
  const img = document.getElementById('introImage');
  const nameEl = document.getElementById('introName');
  img.src = imgSrc;
  nameEl.textContent = name;
  overlay.classList.add('active');
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(name);
    u.lang = 'pt-PT'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
  setTimeout(() => {
    overlay.classList.remove('active');
    if (callback) setTimeout(callback, 350);
  }, duration);
}

// ===== SOUNDS =====
let audioCtx = null;
let audioInitialized = false;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function initAudio() {
  if (audioInitialized) return;
  audioInitialized = true;
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
  } catch(e) {}
  // Also announce first letter on first tap (speech may need user gesture)
  if (!window._firstLetterSpoken) {
    window._firstLetterSpoken = true;
    announceNextLetter();
  }
}

// Initialize audio on first user interaction
document.addEventListener('touchstart', initAudio, { once: true });
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('keydown', initAudio, { once: true });

function playTone(freq, dur, type, vol) {
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.3, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}

function playNoise(dur, vol, lowpass) {
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
    const bufSize = c.sampleRate * dur;
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.25));
    }
    const src = c.createBufferSource();
    src.buffer = buf;
    const flt = c.createBiquadFilter();
    flt.type = 'lowpass';
    flt.frequency.value = lowpass || 400;
    const gn = c.createGain();
    gn.gain.setValueAtTime(vol||0.5, c.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    src.connect(flt); flt.connect(gn); gn.connect(c.destination);
    src.start(); src.stop(c.currentTime + dur);
  } catch(e) {}
}

function sfxCorrect() {
  playTone(523, 0.1, 'triangle', 0.25);
  setTimeout(() => playTone(659, 0.1, 'triangle', 0.25), 60);
  setTimeout(() => playTone(784, 0.15, 'triangle', 0.25), 120);
}

function sfxWrong() {
  playNoise(0.25, 0.3, 200);
}

function sfxBirdHop() {
  playTone(350, 0.08, 'sine', 0.15);
  setTimeout(() => playTone(500, 0.06, 'sine', 0.1), 40);
}

function sfxFart() {
  playNoise(0.25, 0.4, 200 + Math.random() * 150);
  playTone(80, 0.2, 'sawtooth', 0.15);
}

function sfxHey() {
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(400, c.currentTime);
    o.frequency.linearRampToValueAtTime(650, c.currentTime + 0.08);
    o.frequency.linearRampToValueAtTime(350, c.currentTime + 0.2);
    g.gain.setValueAtTime(0.3, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.3);
  } catch(e) {}
}

function sfxExplosion(type) {
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
    type = type || Math.floor(Math.random() * 3);
    if (type === 0) {
      // Classic boom
      playNoise(0.5, 0.7, 800);
      playTone(60, 0.5, 'sawtooth', 0.4);
      setTimeout(() => playNoise(0.3, 0.4, 3000), 50);
      setTimeout(() => playTone(120, 0.3, 'square', 0.2), 80);
    } else if (type === 1) {
      // High-pitched shatter
      playNoise(0.3, 0.6, 2000);
      playTone(200, 0.2, 'square', 0.25);
      setTimeout(() => playTone(400, 0.15, 'square', 0.2), 60);
      setTimeout(() => playTone(800, 0.1, 'square', 0.15), 120);
      setTimeout(() => playNoise(0.2, 0.3, 500), 150);
    } else {
      // Deep earthquake
      playTone(40, 0.6, 'sawtooth', 0.5);
      playNoise(0.7, 0.5, 300);
      setTimeout(() => playTone(30, 0.4, 'square', 0.3), 100);
      setTimeout(() => playNoise(0.4, 0.4, 100), 200);
    }
  } catch(e) {}
}

function sfxFall() {
  try {
    const c = getAudioCtx();
    if (c.state === 'suspended') c.resume();
    // Long descending whoosh
    playTone(300, 0.3, 'sawtooth', 0.25);
    setTimeout(() => playTone(150, 0.3, 'sawtooth', 0.2), 150);
    setTimeout(() => playTone(60, 0.4, 'sawtooth', 0.3), 300);
    // Big thud on landing
    setTimeout(() => {
      playNoise(0.3, 0.5, 150);
      playTone(40, 0.4, 'square', 0.35);
      playTone(25, 0.5, 'sawtooth', 0.3);
    }, 500);
    // Rattle after landing
    setTimeout(() => {
      playNoise(0.15, 0.3, 400);
      playTone(80, 0.1, 'triangle', 0.1);
    }, 550);
  } catch(e) {}
}

// Speech
function speak(text, cb) {
  if (!window.speechSynthesis) { if(cb) cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'pt-PT'; u.rate = 0.85; u.pitch = 1.1;
  u.onend = () => { if(cb) cb(); };
  u.onerror = () => { if(cb) cb(); };
  window.speechSynthesis.speak(u);
}

function letterName(l) {
  const names = {
    'a':'á','b':'bê','c':'cê','d':'dê','e':'é','f':'éfe','g':'guê','h':'agá',
    'i':'i','j':'jota','k':'cápa','l':'éle','m':'éme','n':'éne','o':'ó',
    'p':'pê','q':'quê','r':'érre','s':'ésse','t':'tê','u':'u','v':'vê',
    'w':'dáblio','x':'xis','y':'ípsilon','z':'zê'
  };
  return names[l.toLowerCase()] || l;
}

function speakLetterName(l) {
  speak(letterName(l));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Position characters - fixed centering
function positionCharacters() {
  const wrappers = document.querySelectorAll('.slot-wrapper');
  const bird = document.getElementById('birdChar');
  const pig = document.getElementById('pigChar');
  if (!wrappers.length) return;

  const areaRect = document.getElementById('slotsArea').getBoundingClientRect();

  // Pig on last wrapper
  const lastWrap = wrappers[wrappers.length - 1];
  const lastR = lastWrap.getBoundingClientRect();
  pig.style.left = (lastR.left + lastR.width / 2 - areaRect.left) + 'px';
  pig.style.top = (lastR.top - areaRect.top - 8) + 'px';

  // Bird on next unfilled
  let targetIdx = -1;
  wrappers.forEach((w, i) => {
    if (!w.querySelector('.slot')?.classList.contains('filled') && targetIdx < 0) targetIdx = i;
  });
  if (targetIdx < 0) targetIdx = wrappers.length - 1;

  const targetWrap = wrappers[targetIdx];
  const targetR = targetWrap.getBoundingClientRect();
  bird.style.left = (targetR.left + targetR.width / 2 - areaRect.left) + 'px';
  bird.style.top = (targetR.top - areaRect.top - 8) + 'px';

  if (placedCount > 0) {
    bird.classList.remove('hop');
    void bird.offsetWidth;
    bird.classList.add('hop');
    sfxBirdHop();
  }

  if (placedCount / totalLetters > 0.5) {
    pig.classList.add('scared');
  } else {
    pig.classList.remove('scared');
  }
}

// Idle pig
function pigIdle() {
  if (isWin || placedCount >= totalLetters) return;
  const pig = document.getElementById('pigChar');
  if (!pig || pig.style.display === 'none') return;

  pig.classList.remove('idle-jump');
  void pig.offsetWidth;
  pig.classList.add('idle-jump');

  sfxFart();
  setTimeout(sfxHey, 100);

  clearTimeout(pigTimer);
  pigTimer = setTimeout(pigIdle, 2500 + Math.random() * 3000);
}

// Announce next letter
function announceNextLetter() {
  if (isWin || placedCount >= totalLetters) return;
  const wrappers = document.querySelectorAll('.slot-wrapper');
  for (const w of wrappers) {
    const slot = w.querySelector('.slot');
    if (!slot.classList.contains('filled')) {
      const name = letterName(slot.dataset.letter);
      speak('Encontra a letra ' + name);
      return;
    }
  }
}

// Idle hint
function resetHintTimer() {
  clearTimeout(hintTimer);
  if (isWin) return;
  hintTimer = setTimeout(() => {
    if (isWin || placedCount >= totalLetters) return;
    announceNextLetter();
    hintTimer = setTimeout(announceNextLetter, HINT_DELAY);
  }, HINT_DELAY);
}

function loadPhrase(idx) {
  const phrase = PHRASES[phraseOrder[idx % phraseOrder.length]];
  const words = phrase.text.split(' ');

  const letterData = [];
  words.forEach((word, wi) => {
    for (let li = 0; li < word.length; li++) {
      letterData.push({ letter: word[li], wordIdx: wi, posInWord: li, index: letterData.length });
    }
  });

  totalLetters = letterData.length;
  placedCount = 0;
  isWin = false;
  clearTimeout(hintTimer);
  clearTimeout(pigTimer);

  document.getElementById('winOverlay').classList.remove('active');
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('phraseHint').textContent = phrase.hint || 'Arrasta cada letra';

  const oldPig = document.querySelector('.pig-fly');
  if (oldPig) oldPig.remove();

  // Slots
  const slotsEl = document.getElementById('slotsContainer');
  slotsEl.innerHTML = '';
  let letterIdx = 0;

  words.forEach((word, wi) => {
    if (wi > 0) {
      const spacer = document.createElement('div');
      spacer.className = 'slot space';
      slotsEl.appendChild(spacer);
    }
    const group = document.createElement('div');
    group.className = 'word-group';
    for (let li = 0; li < word.length; li++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'slot-wrapper';
      const div = document.createElement('div');
      div.className = 'slot';
      div.dataset.index = letterIdx;
      div.dataset.letter = word[li];
      div.textContent = '';
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
      div.addEventListener('drop', e => { e.preventDefault(); div.classList.remove('drag-over'); handleDrop(e, letterIdx); });
      wrapper.appendChild(div);
      group.appendChild(wrapper);
      letterIdx++;
    }
    slotsEl.appendChild(group);
  });

  // Characters - pick random bird and pig
  currentBird = BIRDS[Math.floor(Math.random() * BIRDS.length)];
  currentPig = PIGS[Math.floor(Math.random() * PIGS.length)];
  
  // Prepare shuffled letters
  const shuffled = shuffle(letterData.map(ld => ({ letter: ld.letter, index: ld.index })));
  
  // Show intro animation with characters
  const birdName = BIRD_NAMES[currentBird] || currentBird;
  const pigName = PIG_NAMES[currentPig] || currentPig;
  showIntro('assets/' + currentBird, birdName, 1600, () => {
    document.getElementById('slotsArea').style.opacity = '0';
    document.getElementById('letterPool').style.opacity = '0';
    showIntro('assets/' + currentPig, pigName, 1600, () => {
      document.getElementById('slotsArea').style.opacity = '1';
      document.getElementById('letterPool').style.opacity = '1';
      finishLoadPhrase(letterData, words, phrase, shuffled);
    });
  });
}

function finishLoadPhrase(letterData, words, phrase, shuffled) {
  
  document.querySelectorAll('.slot-character').forEach(el => el.remove());

  const birdDiv = document.createElement('div');
  birdDiv.className = 'slot-character bird';
  birdDiv.id = 'birdChar';
  birdDiv.innerHTML = '<img src="assets/' + currentBird + '" alt="🐦">';
  document.getElementById('slotsArea').appendChild(birdDiv);

  const pigDiv = document.createElement('div');
  pigDiv.className = 'slot-character pig';
  pigDiv.id = 'pigChar';
  pigDiv.innerHTML = '<img src="assets/' + currentPig + '" alt="🐷">';
  document.getElementById('slotsArea').appendChild(pigDiv);

  requestAnimationFrame(() => requestAnimationFrame(positionCharacters));

  // Letter pool - use passed shuffled array
  const pool = document.getElementById('letterPool');
  pool.innerHTML = '';

  shuffled.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'letter';
    div.draggable = true;
    div.textContent = item.letter;
    div.dataset.letter = item.letter;
    div.dataset.origIdx = item.index;

    div.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', JSON.stringify({letter: item.letter, idx: item.index}));
      div.classList.add('dragging');
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));

    let tx, ty;
    div.addEventListener('touchstart', e => {
      const t = e.touches[0];
      tx = t.clientX; ty = t.clientY;
      div.classList.add('dragging');
      dragData = { letter: item.letter, idx: item.index, el: div };
      const ghost = document.getElementById('dragGhost');
      ghost.textContent = item.letter;
      ghost.style.display = 'flex'; ghost.style.left = t.clientX + 'px'; ghost.style.top = t.clientY + 'px';
    }, { passive: true });
    div.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      document.getElementById('dragGhost').style.left = t.clientX + 'px';
      document.getElementById('dragGhost').style.top = t.clientY + 'px';
    }, { passive: false });
    div.addEventListener('touchend', e => {
      div.classList.remove('dragging');
      document.getElementById('dragGhost').style.display = 'none';
      const t = e.changedTouches[0];
      const dx = t.clientX - tx, dy = t.clientY - ty;
      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
      const slots = document.querySelectorAll('.slot:not(.space)');
      let targetIdx = -1;
      slots.forEach(slot => {
        const r = slot.getBoundingClientRect();
        if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom)
          targetIdx = parseInt(slot.dataset.index);
      });
      if (targetIdx >= 0 && dragData) handleLetterDrop(dragData.letter, dragData.idx, targetIdx);
      dragData = null;
    }, { passive: true });
    div.addEventListener('click', () => {
      const slots = document.querySelectorAll('.slot:not(.space)');
      for (const slot of slots) {
        const idx = parseInt(slot.dataset.index);
        if (idx >= 0 && !slot.classList.contains('filled')) { handleLetterDrop(item.letter, item.index, idx); break; }
      }
    });
    pool.appendChild(div);
  });

  updateStats();
  resetHintTimer();
  setTimeout(pigIdle, 2000 + Math.random() * 2000);
  setTimeout(announceNextLetter, 800);
}

function handleDrop(e, slotIdx) {
  try { const d = JSON.parse(e.dataTransfer.getData('text/plain')); handleLetterDrop(d.letter, d.idx, slotIdx); } catch(_) {}
}

function handleLetterDrop(letter, origIdx, slotIdx) {
  if (isWin) return;
  const slots = document.querySelectorAll('.slot:not(.space)');
  const slotEl = Array.from(slots).find(s => parseInt(s.dataset.index) === slotIdx);
  if (!slotEl || slotEl.classList.contains('filled')) return;

  if (letter === slotEl.dataset.letter) {
    slotEl.classList.add('filled');
    slotEl.textContent = letter;
    placedCount++;
    document.querySelectorAll('.letter').forEach(el => {
      if (el.textContent === letter && !el.classList.contains('placed') && parseInt(el.dataset.origIdx) === origIdx)
        el.classList.add('placed');
    });
    speakLetterName(letter);
    sfxCorrect();
    score++;
    showFeedback('✅', 'ok');
    updateStats();
    positionCharacters();
    resetHintTimer();
    setTimeout(announceNextLetter, 600);

    if (placedCount === totalLetters) {
      clearTimeout(hintTimer);
      clearTimeout(pigTimer);
      setTimeout(() => onWin(), 500);
    }
  } else {
    slotEl.classList.add('wrong');
    setTimeout(() => slotEl.classList.remove('wrong'), 400);
    sfxWrong();
    showFeedback('❌', 'fail');
    resetHintTimer();
  }
}

function onWin() {
  isWin = true;
  const phrase = PHRASES[phraseOrder[currentPhraseIdx % phraseOrder.length]];

  document.getElementById('birdChar').style.display = 'none';
  document.getElementById('pigChar').style.display = 'none';
  
  // Set win screen characters
  document.getElementById('winBird').src = 'assets/' + currentBird;
  document.getElementById('winPig').src = 'assets/' + currentPig;
  
  // Random explosion type
  const expType = Math.floor(Math.random() * 3);
  sfxExplosion(expType);
  
  // Clear old explosions
  document.querySelectorAll('.explosion-ring,.explosion-particle,.flash,.explosion').forEach(el => el.remove());
  
  // Flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);
  
  // Explosion rings (all types)
  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'explosion-ring';
    ring.style.borderColor = ['#f39c12','#e74c3c','#f1c40f'][i];
    ring.style.animationDelay = (i * 0.1) + 's';
    document.body.appendChild(ring);
    setTimeout(() => ring.remove(), 1200);
  }
  
  // Center burst - varies by type
  const boom = document.createElement('div');
  boom.className = 'explosion';
  const burstEmojis = ['💥', '✨', '💫', '🔥', '⭐', '💢'];
  boom.textContent = burstEmojis[Math.floor(Math.random() * burstEmojis.length)];
  if (expType === 1) boom.style.fontSize = '120px';
  else if (expType === 2) boom.style.fontSize = '80px';
  else boom.style.fontSize = '100px';
  document.body.appendChild(boom);
  setTimeout(() => boom.remove(), 900);
  
  // Particles vary by type
  const particleCount = expType === 1 ? 25 : expType === 2 ? 20 : 15;
  const colors = expType === 0 ? ['#f39c12','#e74c3c','#f1c40f','#e67e22','#ff6b9d'] :
                  expType === 1 ? ['#ff6b9d','#a29bfe','#00d2ff','#fff','#f1c40f'] :
                  ['#2d3436','#636e72','#b2bec3','#e74c3c','#d63031'];
  const spread = expType === 2 ? 250 : 400;
  for (let i = 0; i < particleCount; i++) {
    const p = document.createElement('div');
    p.className = 'explosion-particle';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (4 + Math.random() * 12) + 'px';
    p.style.height = p.style.width;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.setProperty('--dx', ((Math.random() - 0.5) * spread) + 'px');
    p.style.setProperty('--dy', ((Math.random() - 0.5) * spread) + 'px');
    p.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }

  // Pig flies after explosion
  setTimeout(() => {
    const pigFly = document.createElement('div');
    pigFly.className = 'pig-fly';
    pigFly.innerHTML = '<img src="assets/' + currentPig + '" alt="🐷">';
    document.body.appendChild(pigFly);

    // Fall sound
    setTimeout(() => sfxFall(), 1400);

    setTimeout(() => {
      pigFly.remove();
      document.getElementById('winPhrase').textContent = phrase.text;
      document.getElementById('winOverlay').classList.add('active');
      speak(phrase.text);
    }, 2500);
  }, 600);
}

function nextPhrase() {
  document.getElementById('birdChar').style.display = 'block';
  document.getElementById('pigChar').style.display = 'block';
  currentPhraseIdx++;
  loadPhrase(currentPhraseIdx);
}

function showFeedback(msg, type) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg; el.className = 'msg ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 1000);
}

function updateStats() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('totalDisplay').textContent = PHRASES.length;
}

window.addEventListener('resize', () => { if (!isWin) positionCharacters(); });

function startLetterGame() {
  document.getElementById('startOverlay').style.opacity = '0';
  setTimeout(() => { document.getElementById('startOverlay').style.display = 'none'; }, 300);
  initAudio();
}

loadPhrase(0);
</script>
